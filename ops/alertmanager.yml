# AlertManager routing for Labelforge (TASK-041).
#
# - critical severity -> PagerDuty Events v2
# - warning severity  -> Slack webhook + email
# - everything        -> email fallback (team-ops@)
#
# Secrets are loaded from environment variables; rotate via your secret
# manager. Do NOT commit real PAGERDUTY_ROUTING_KEY / SLACK_WEBHOOK_URL.
global:
  resolve_timeout: 5m
  slack_api_url_file: /etc/alertmanager/slack_webhook

route:
  receiver: email-ops
  group_by: ["alertname", "service"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 3h
  routes:
    - matchers:
        - severity = "critical"
      receiver: pagerduty-critical
      continue: true
    - matchers:
        - severity = "warning"
      receiver: slack-warning

receivers:
  - name: email-ops
    email_configs:
      - to: team-ops@labelforge.dev
        send_resolved: true

  - name: pagerduty-critical
    pagerduty_configs:
      - routing_key_file: /etc/alertmanager/pagerduty_key
        severity: "{{ .CommonLabels.severity }}"
        description: "{{ .CommonAnnotations.summary }}"
        details:
          runbook: "{{ .CommonLabels.runbook }}"
          service: "{{ .CommonLabels.service }}"

  - name: slack-warning
    slack_configs:
      - channel: "#ops-alerts"
        send_resolved: true
        title: "{{ .Status | toUpper }} — {{ .CommonAnnotations.summary }}"
        text: |
          *Service:* {{ .CommonLabels.service }}
          *Severity:* {{ .CommonLabels.severity }}
          {{ range .Alerts }}• {{ .Annotations.description }}
          {{ end }}
